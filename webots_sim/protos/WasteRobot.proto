#VRML_SIM R2023b utf8
# ============================================================
# WasteRobot PROTO — 음식물쓰레기통 수거 로봇
# ============================================================
#
# 하드웨어 명세서 기반 스펙:
#   - 크기: 350 x 300 x 250mm (L x W x H) — 바디 기준
#   - 무게: ~8kg (배터리 포함)
#   - 구동: 2WD 디퍼렌셜 (전륜 구동 + 후방 캐스터)
#   - 바퀴: 반지름 0.04m, 폭 0.03m, 간격 0.30m
#
# 센서:
#   - camera_front: 전면 RGB 카메라 (640x480, 60 deg FOV)
#   - camera_rear:  후면 RGB 카메라 (640x480, 60 deg FOV)
#   - depth_front:  전면 RangeFinder 깊이 카메라 (640x480)
#   - 초음파 x5: front_center(0), front_left(45), front_right(-45),
#                left(90), right(-90), 최대 2.0m, sonar 타입
#   - IMU: InertialUnit + Gyro + Accelerometer
#   - 엔코더: PositionSensor x2 (좌/우 바퀴)
#
# 액추에이터:
#   - left_wheel_motor, right_wheel_motor: RotationalMotor, max 6.28 rad/s
#   - lifter_motor: LinearMotor (파지 메커니즘 placeholder)
#
# ROS 2 토픽 매핑 (ros2_controller.py 참조):
#   camera_front        -> /camera/front/image_raw
#   camera_rear         -> /camera/rear/image_raw
#   depth_front         -> /camera/depth/image_raw
#   us_front_center     -> /ultrasonic/front_center
#   us_front_left       -> /ultrasonic/front_left
#   us_front_right      -> /ultrasonic/front_right
#   us_left             -> /ultrasonic/left
#   us_right            -> /ultrasonic/right
#   imu + gyro + accel  -> /imu/data
#   left_wheel_encoder  -> /wheel/left/position
#   right_wheel_encoder -> /wheel/right/position
#   /cmd_vel            -> left_wheel_motor + right_wheel_motor
# ============================================================

PROTO WasteRobot [
  field SFVec3f    translation  0 0.05 0
  field SFRotation rotation     0 1 0 0
  field SFString   name         "waste_robot"
  field SFString   controller   "ros2_controller"
  field SFColor    bodyColor    0.8 0.15 0.15
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    name IS name
    controller IS controller

    children [

      # ============================================================
      # 메인 바디 (0.35 x 0.30 x 0.25m)
      # ============================================================
      Pose {
        translation 0 0.125 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor IS bodyColor
              roughness 0.5
              metalness 0.2
            }
            geometry Box {
              size 0.35 0.25 0.30
            }
          }
        ]
      }

      # --- 상단 커버 (약간 밝은 색) ---
      Pose {
        translation 0 0.26 0
        children [
          Shape {
            appearance PBRAppearance {
              baseColor 0.3 0.3 0.35
              roughness 0.4
              metalness 0.3
            }
            geometry Box {
              size 0.30 0.02 0.26
            }
          }
        ]
      }

      # ============================================================
      # 롤러 파지 메커니즘 (전면) — LinearMotor 포함
      # ============================================================
      SliderJoint {
        jointParameters JointParameters {
          axis 0 1 0
        }
        device [
          LinearMotor {
            name "lifter_motor"
            maxVelocity 0.1
            maxForce 50
            minPosition -0.05
            maxPosition 0.1
          }
        ]
        endPoint Solid {
          translation 0.19 0.06 0
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 0.8 0.3 0.1
                roughness 0.7
              }
              geometry Cylinder {
                height 0.25
                radius 0.02
              }
            }
          ]
          name "lifter"
          boundingObject Cylinder {
            height 0.25
            radius 0.02
          }
          physics Physics {
            mass 0.3
          }
        }
      }

      # ============================================================
      # 좌측 구동 바퀴 (z=+0.15 방향)
      # ============================================================
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 0 1
          anchor 0.05 0 0.15
        }
        device [
          RotationalMotor {
            name "left_wheel_motor"
            maxVelocity 6.28
            maxTorque 5.0
          }
          PositionSensor {
            name "left_wheel_encoder"
          }
        ]
        endPoint Solid {
          translation 0.05 0 0.15
          rotation 1 0 0 1.5708
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 0.1 0.1 0.1
                roughness 0.95
                metalness 0.0
              }
              geometry Cylinder {
                height 0.03
                radius 0.04
              }
            }
          ]
          name "left_wheel"
          contactMaterial "rubber"
          boundingObject Cylinder {
            height 0.03
            radius 0.04
          }
          physics Physics {
            mass 0.2
            density -1
          }
        }
      }

      # ============================================================
      # 우측 구동 바퀴 (z=-0.15 방향)
      # ============================================================
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0 0 1
          anchor 0.05 0 -0.15
        }
        device [
          RotationalMotor {
            name "right_wheel_motor"
            maxVelocity 6.28
            maxTorque 5.0
          }
          PositionSensor {
            name "right_wheel_encoder"
          }
        ]
        endPoint Solid {
          translation 0.05 0 -0.15
          rotation 1 0 0 1.5708
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 0.1 0.1 0.1
                roughness 0.95
                metalness 0.0
              }
              geometry Cylinder {
                height 0.03
                radius 0.04
              }
            }
          ]
          name "right_wheel"
          contactMaterial "rubber"
          boundingObject Cylinder {
            height 0.03
            radius 0.04
          }
          physics Physics {
            mass 0.2
            density -1
          }
        }
      }

      # ============================================================
      # 후방 캐스터 (볼 조인트)
      # ============================================================
      BallJoint {
        jointParameters BallJointParameters {
          anchor -0.13 -0.015 0
        }
        endPoint Solid {
          translation -0.13 -0.015 0
          children [
            Shape {
              appearance PBRAppearance {
                baseColor 0.5 0.5 0.5
                roughness 0.3
                metalness 0.5
              }
              geometry Sphere {
                radius 0.025
              }
            }
          ]
          name "caster"
          boundingObject Sphere {
            radius 0.025
          }
          physics Physics {
            mass 0.1
            density -1
          }
        }
      }

      # ============================================================
      # 전면 RGB 카메라 (camera_front) — 640x480, 60 deg FOV
      # ============================================================
      Pose {
        translation 0.18 0.18 0
        rotation 0 0 1 0
        children [
          Camera {
            name "camera_front"
            width 640
            height 480
            fieldOfView 1.0472
            near 0.01
          }
        ]
      }

      # ============================================================
      # 전면 깊이 카메라 (depth_front) — RangeFinder, 640x480
      # ============================================================
      Pose {
        translation 0.18 0.16 0
        rotation 0 0 1 0
        children [
          RangeFinder {
            name "depth_front"
            width 640
            height 480
            fieldOfView 1.0472
            minRange 0.1
            maxRange 10.0
          }
        ]
      }

      # ============================================================
      # 후면 RGB 카메라 (camera_rear) — 640x480, 60 deg FOV
      # ============================================================
      Pose {
        translation -0.18 0.18 0
        rotation 0 1 0 3.14159
        children [
          Camera {
            name "camera_rear"
            width 640
            height 480
            fieldOfView 1.0472
            near 0.01
          }
        ]
      }

      # ============================================================
      # 초음파 센서 x5 (HC-SR04 호환, sonar 타입, 최대 2.0m)
      # ============================================================

      # front_center (0 deg) — 정면
      Pose {
        translation 0.18 0.10 0
        rotation 0 0 1 0
        children [
          DistanceSensor {
            name "us_front_center"
            lookupTable [
              0.0  0.0  0.0
              2.0  2.0  0.0
            ]
            type "sonar"
            numberOfRays 3
          }
        ]
      }

      # front_left (45 deg) — 전방 좌측
      Pose {
        translation 0.16 0.10 0.10
        rotation 0 1 0 0.7854
        children [
          DistanceSensor {
            name "us_front_left"
            lookupTable [
              0.0  0.0  0.0
              2.0  2.0  0.0
            ]
            type "sonar"
            numberOfRays 3
          }
        ]
      }

      # front_right (-45 deg) — 전방 우측
      Pose {
        translation 0.16 0.10 -0.10
        rotation 0 1 0 -0.7854
        children [
          DistanceSensor {
            name "us_front_right"
            lookupTable [
              0.0  0.0  0.0
              2.0  2.0  0.0
            ]
            type "sonar"
            numberOfRays 3
          }
        ]
      }

      # left (90 deg) — 좌측
      Pose {
        translation 0 0.10 0.16
        rotation 0 1 0 1.5708
        children [
          DistanceSensor {
            name "us_left"
            lookupTable [
              0.0  0.0  0.0
              2.0  2.0  0.0
            ]
            type "sonar"
            numberOfRays 3
          }
        ]
      }

      # right (-90 deg) — 우측
      Pose {
        translation 0 0.10 -0.16
        rotation 0 1 0 -1.5708
        children [
          DistanceSensor {
            name "us_right"
            lookupTable [
              0.0  0.0  0.0
              2.0  2.0  0.0
            ]
            type "sonar"
            numberOfRays 3
          }
        ]
      }

      # ============================================================
      # IMU (InertialUnit + Gyro + Accelerometer)
      # ============================================================
      InertialUnit {
        name "imu"
      }
      Gyro {
        name "gyro"
      }
      Accelerometer {
        name "accelerometer"
      }

    ]

    # ============================================================
    # 물리 속성
    # ============================================================
    boundingObject Pose {
      translation 0 0.125 0
      children [
        Box {
          size 0.35 0.25 0.30
        }
      ]
    }
    physics Physics {
      mass 8.0
      centerOfMass 0 0.08 0
      density -1
      inertiaMatrix [
        0.1 0.15 0.1
        0 0 0
      ]
    }
  }
}
